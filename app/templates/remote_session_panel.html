<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ remote_label }}</title>
  <link rel="stylesheet" href="/static/css/app.css?v={{ asset_version }}">
  <link rel="stylesheet" href="/static/css/remote.css?v={{ asset_version }}">
  {% if remote.protocol == 'ssh' %}
  <link rel="stylesheet" href="/static/vendor/xterm/xterm.css?v={{ asset_version }}">
  {% endif %}
</head>
<body class="remote-panel-body">
  {% include "_remote_session_panel.html" %}
  {% if remote.protocol == 'ssh' %}
  <script src="/static/vendor/xterm/xterm.js?v={{ asset_version }}"></script>
  <script src="/static/vendor/xterm/addon-fit.js?v={{ asset_version }}"></script>
  <script src="/static/js/remote_session.js?v={{ asset_version }}&ssh=homelab-rewrite-3"></script>
  {% else %}
  <script type="module" src="/static/js/remote_rdp.js?v={{ asset_version }}"></script>
  {% endif %}
</body>
</html>
