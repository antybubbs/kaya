{% extends "base.html" %}{% block content %}
<section class="module-header runbook-subheader"><div><h1>Import Runbooks</h1><p class="muted">Import a UTF-8 Markdown or text file as a normal Kaya runbook.</p></div></section>
<div class="runbook-dashboard-shell">{% include "_runbook_nav.html" %}<main class="runbook-dashboard-main"><section class="panel runbook-import-card"><h2>Import one runbook</h2><p class="muted">The filename becomes the title. You can review all metadata before publishing the page.</p><form method="post" enctype="multipart/form-data"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><label>Document<input type="file" name="document" accept=".md,.markdown,.txt,text/markdown,text/plain" required></label><label>Space (optional)<select name="space_id"><option value="">Unassigned</option>{% for space in spaces|default([]) %}<option value="{{ space.id }}">{{ space.name }}</option>{% endfor %}</select></label><button>Import and review</button></form></section></main></div>{% endblock %}
