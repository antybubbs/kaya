{% extends "base.html" %}
{% block extra_head %}<link rel="stylesheet" href="/static/css/login.css?v={{ asset_version }}">{% endblock %}
{% block public %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand"><img class="login-logo" src="/static/brand/kaya-logo.svg" alt="{{ brand.name }}" width="220" height="220"></div>
    <h1>Set new password</h1>
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="post" action="/reset-password" class="stack">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <input type="hidden" name="token" value="{{ token }}">
      <label>New password<input name="password" type="password" minlength="12" required autofocus></label>
      <label>Confirm password<input name="confirm_password" type="password" minlength="12" required></label>
      <div class="login-actions">
        <button type="submit">Update password</button>
        <a href="/login">Back to sign in</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
