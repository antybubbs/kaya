{% extends "base.html" %}
{% block extra_head %}<link rel="stylesheet" href="/static/css/remote.css?v={{ asset_version }}">{% endblock %}
{% block main_class %}remote-main{% endblock %}
{% block content %}
<div class="remote-workspace" data-remote-tabs data-remote-session-version="homelab-split-ui-1">
  {% include "_remote_host_rail.html" %}
  <section class="remote-tab-workspace">
    <div class="remote-tabbar" data-remote-tabbar aria-label="Remote sessions"></div>
    <div class="remote-tab-panels" data-remote-tab-panels>
      <section class="remote-console-empty" data-remote-empty>
        <div>
          <h1>HomeLab Remote Manager</h1>
          <p class="muted">Open an SSH or RDP session from the host rail.</p>
        </div>
      </section>
    </div>
  </section>
</div>
<script src="/static/js/remote_workspace.js?v={{ asset_version }}&remote-ui=host-groups-1" defer></script>
{% endblock %}
