<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Secure package · {{ brand.name }}</title><link rel="icon" href="{{ brand.favicon }}"><link rel="stylesheet" href="/static/css/secure-send-gateway.css"></head><body><main class="gateway-shell"><section class="gateway-card"><header><img src="{{ brand.icon }}" alt="" width="44" height="44"><div><span>{{ brand.name }}</span><strong>Secure Send</strong></div></header><div class="gateway-lock">⌁</div><h1>Open secure package</h1><p>Enter the PIN and passphrase supplied by the sender. These details are never included with the link.</p>{% if error %}<div class="gateway-alert" role="alert">{{ error }}</div>{% endif %}<form method="post" action="/{{ access_token }}/unlock"><label>PIN<input name="pin" type="password" required autocomplete="off" maxlength="32" autofocus></label><label>Passphrase<input name="passphrase" type="password" required autocomplete="off" maxlength="200"></label><button type="submit">Unlock package</button></form><footer>Encrypted at rest · Session expires after 15 minutes</footer></section></main></body></html>
