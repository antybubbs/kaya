{% extends "base.html" %}{% block extra_head %}<link rel="stylesheet" href="/static/css/secure-send.css?v={{ asset_version }}">{% endblock %}{% block content %}<section class="panel secure-send-auth-card"><span class="eyebrow">Secure Send</span><h1>Save to Secret Vault</h1><p class="muted">Enter the package credentials. Your Secret Vault must already be unlocked.</p>{% if error %}<div class="alert">{{ error }}</div>{% endif %}<form method="post" action="/security/secure-send/receive/{{ access_token }}/save" class="stack"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><label>PIN<input name="pin" type="password" required autocomplete="off"></label><label>Passphrase<input name="passphrase" type="password" required autocomplete="off"></label><button class="button" type="submit">Save independent copy</button></form></section>{% endblock %}
