{% extends "base.html" %}
{% block extra_head %}<link rel="stylesheet" href="/static/css/login.css?v={{ asset_version }}">{% endblock %}
{% block public %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand"><img class="login-logo" src="/static/brand/kaya-logo.svg" alt="{{ brand.name }}" width="220" height="220"></div>
    <h1>Reset password</h1>
    <p class="muted">Enter your account email and we will send a reset link if mail is configured.</p>
    {% if message %}<div class="success">{{ message }}</div>{% endif %}
    {% if error %}<div class="alert">{{ error }}</div>{% endif %}
    <form method="post" action="/forgot-password" class="stack">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <label>Email<input name="email" type="email" required autofocus></label>
      <div class="login-actions">
        <button type="submit">Send reset link</button>
        <a href="/login">Back to sign in</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
