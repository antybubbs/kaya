name: homelab

services:
  homelab:
    build: .
    container_name: homelab
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_RAW
    read_only: false
    tmpfs:
      - /tmp