services:
  keyvault:
    build: .
    container_name: keyvault
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp
