name: kaya

services:
  kaya:
    image: ${KAYA_IMAGE:-ghcr.io/antybubbs/kaya:latest}
    container_name: kaya
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/kaya.db
    ports:
      - "${KAYA_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_RAW
    read_only: false
    tmpfs:
      - /tmp
  guacd:
    image: guacamole/guacd:1.6.0
    container_name: kaya-guacd
    restart: unless-stopped

networks:
  default:
    driver: bridge
    driver_opts:
      # Match NetBird's default WireGuard MTU so large RDP graphics packets do
      # not enter the VPN through a 1500-byte Docker bridge and black-hole.
      com.docker.network.driver.mtu: "1280"
