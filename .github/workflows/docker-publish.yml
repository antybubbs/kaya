name: Build and publish Docker image

on:
  push:
    branches:
      - main
      - Kaya
      - "dev*"
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        shell: bash
        run: |
          OWNER="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          IMAGE="ghcr.io/$OWNER/kaya"
          SHORT_SHA="$(printf '%s' '${{ github.sha }}' | cut -c1-12)"
          REF_NAME='${{ github.ref_name }}'
          REF_TAG="$(printf '%s' "$REF_NAME" | tr '[:upper:]' '[:lower:]' | tr -c 'a-z0-9_.-' '-')"
          VERSION="$SHORT_SHA"
          if printf '%s' '${{ github.ref }}' | grep -q '^refs/tags/'; then
            VERSION="$REF_NAME"
          elif printf '%s' "$REF_NAME" | grep -Eq '^(dev|Kaya)'; then
            VERSION="$REF_TAG"
          fi

          {
            echo "image=$IMAGE"
            echo "short_sha=$SHORT_SHA"
            echo "ref_tag=$REF_TAG"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push main commit image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          labels: |
            org.opencontainers.image.title=Kaya
            org.opencontainers.image.description=Your Infrastructure. Your Home.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.image }}:latest

      - name: Build and push development branch image
        if: startsWith(github.ref_name, 'dev')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          labels: |
            org.opencontainers.image.title=Kaya
            org.opencontainers.image.description=Your Infrastructure. Your Home.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.ref_tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.ref_tag }}-${{ steps.meta.outputs.short_sha }}

      - name: Build and push Kaya branch image
        if: github.ref_name == 'Kaya'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          labels: |
            org.opencontainers.image.title=Kaya
            org.opencontainers.image.description=Your Infrastructure. Your Home.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.ref_tag }}
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.ref_tag }}-${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.image }}:latest

      - name: Build and push release image
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
          labels: |
            org.opencontainers.image.title=Kaya
            org.opencontainers.image.description=Your Infrastructure. Your Home.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.ref_name }}
            ${{ steps.meta.outputs.image }}:latest
