name: homelab

services:
  homelab:
    image: ${HOMELAB_IMAGE:?Set HOMELAB_IMAGE in .env}
    container_name: homelab
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    ports:
      - "${HOMELAB_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    read_only: true
    pids_limit: 256
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - NET_RAW
      - SETGID
      - SETUID
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


